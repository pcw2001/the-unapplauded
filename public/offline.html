<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Unapplauded — 离线</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F5F0EB;
      color: #2C2C2C;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #8A8A8A;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    .message {
      color: #8A8A8A;
      font-size: 0.95rem;
      line-height: 1.8;
      max-width: 400px;
    }
    .message p { margin-bottom: 0.5rem; }
    .hint {
      margin-top: 2rem;
      color: #8B7355;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>The Unapplauded</h1>
  <p class="subtitle">A museum for ordinary victories.</p>
  <div class="message">
    <p>博物馆还在。</p>
    <p>你保存的展品在这个浏览器里，一直都在。</p>
    <p>只是现在网络不太通，新的小事暂时放不进来。</p>
  </div>
  <p class="hint">连接网络后刷新页面，继续记录。</p>
</body>
</html>
